<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Крестики-Нолики 5x5</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e2a3a, #0f172a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 24px 20px 32px 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .game {
            text-align: center;
            background: #0f172ad9;
            border-radius: 36px;
            padding: 20px;
            box-shadow: inset 0 0 8px #00000033, 0 10px 20px rgba(0,0,0,0.2);
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 2.2rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f0f9ff, #bae6fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .turn-indicator {
            background: #1e293b;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.3rem;
            margin: 10px 0 18px 0;
            box-shadow: inset 0 1px 2px #ffffff1a, 0 4px 8px #00000033;
            color: #cbd5e6;
        }

        .turn-X {
            color: #3b82f6;
            text-shadow: 0 0 6px #3b82f6;
        }
        .turn-O {
            color: #ef4444;
            text-shadow: 0 0 6px #ef4444;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(5, minmax(60px, 85px));
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
        }

        .cell {
            aspect-ratio: 1 / 1;
            background: #1f2a3e;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 0 #0a0f1c;
            color: white;
            text-shadow: 0 2px 5px black;
        }

        .cell.X {
            color: #60a5fa;
            text-shadow: 0 0 12px #3b82f6;
        }
        .cell.O {
            color: #f87171;
            text-shadow: 0 0 12px #ef4444;
        }

        .cell:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #0a0f1c;
        }

        .disabled-cell {
            cursor: default;
            filter: brightness(0.95);
        }
        .disabled-cell:active {
            transform: none;
        }

        .win-highlight {
            background: radial-gradient(circle, #4c1d95, #2e1065);
            box-shadow: 0 0 18px #a78bfa;
            border: 1px solid #c4b5fd;
        }

        .status {
            background: #0f172a;
            padding: 12px;
            border-radius: 60px;
            margin: 16px 10px 0 10px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .reset-btn {
            background: #e11d48;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 4px 0 #881337;
        }
        .reset-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #881337;
        }

        .score {
            display: flex;
            gap: 20px;
            background: #1e293b;
            padding: 5px 16px;
            border-radius: 36px;
        }
        .score span {
            font-weight: bold;
            font-size: 1.3rem;
        }
        .score-x {
            color: #3b82f6;
        }
        .score-o {
            color: #ef4444;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 18px;
            opacity: 0.7;
            color: #94a3b8;
        }

        @media (max-width: 550px) {
            .board {
                gap: 8px;
                grid-template-columns: repeat(5, minmax(50px, 70px));
            }
            .cell {
                font-size: 2.2rem;
                border-radius: 18px;
            }
            .turn-indicator {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game">
        <h1>⚡ КРЕСТИКИ-НОЛИКИ ⚡</h1>
        <div class="turn-indicator" id="turnIndicator">
            Ход: <span id="turnText">X</span>
        </div>
        <div class="board" id="board"></div>
        <div class="status">
            <div class="score">
                🅧 <span class="score-x" id="scoreX">0</span> &nbsp;|&nbsp;
                🄾 <span class="score-o" id="scoreO">0</span>
            </div>
            <button class="reset-btn" id="resetBtn">🔄 Новая игра</button>
        </div>
        <footer>✔️ 5x5 поле | победа: 5 в ряд</footer>
    </div>
</div>

<script>
    (function(){
        // ------ конфиг ------
        const BOARD_SIZE = 5;
        const WIN_CONDITION = 5; // нужно 5 в ряд

        let board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(null));
        let currentPlayer = 'X';   // X всегда начинает
        let gameActive = true;
        let winner = null;          // 'X', 'O' или null
        
        // Счёт
        let scoreX = 0;
        let scoreO = 0;

        // DOM элементы
        const boardElement = document.getElementById('board');
        const turnTextSpan = document.getElementById('turnText');
        const turnIndicatorDiv = document.getElementById('turnIndicator');
        const scoreXSpan = document.getElementById('scoreX');
        const scoreOSpan = document.getElementById('scoreO');
        const resetBtn = document.getElementById('resetBtn');

        // ------ вспомогательные функции обновления UI ------
        function updateTurnUI() {
            if(!gameActive) {
                if(winner === 'X') turnTextSpan.innerText = '🏆 ПОБЕДА X 🏆';
                else if(winner === 'O') turnTextSpan.innerText = '🏆 ПОБЕДА O 🏆';
                else if(winner === null && !gameActive) turnTextSpan.innerText = '🤝 НИЧЬЯ 🤝';
                else turnTextSpan.innerText = currentPlayer;
            } else {
                turnTextSpan.innerText = currentPlayer;
            }
            // меняем цвет подстветки
            if (turnTextSpan.innerText.includes('X') || turnTextSpan.innerText === 'X') {
                turnTextSpan.className = 'turn-X';
            } else if (turnTextSpan.innerText.includes('O') || turnTextSpan.innerText === 'O') {
                turnTextSpan.className = 'turn-O';
            } else {
                turnTextSpan.className = '';
            }
        }

        function updateScoreUI() {
            scoreXSpan.innerText = scoreX;
            scoreOSpan.innerText = scoreO;
        }

        // Проверка победы (5 в ряд) — оптимизированный проход по всем направлениям
        function checkWin(row, col, player) {
            // если клетка пустая (но по логике она уже заполнена) — но перестраховка
            if(board[row][col] !== player) return false;

            // направления: горизонталь (1,0), вертикаль (0,1), диагональ (1,1) и антидиагональ (1,-1)
            const directions = [[1,0],[0,1],[1,1],[1,-1]];

            for(let [dx, dy] of directions) {
                let count = 1;
                // шаг в положительную сторону
                for(let step = 1; step <= 4; step++) {
                    const newRow = row + dx*step;
                    const newCol = col + dy*step;
                    if(newRow < 0 || newRow >= BOARD_SIZE || newCol < 0 || newCol >= BOARD_SIZE) break;
                    if(board[newRow][newCol] === player) count++;
                    else break;
                }
                // шаг в отрицательную сторону
                for(let step = 1; step <= 4; step++) {
                    const newRow = row - dx*step;
                    const newCol = col - dy*step;
                    if(newRow < 0 || newRow >= BOARD_SIZE || newCol < 0 || newCol >= BOARD_SIZE) break;
                    if(board[newRow][newCol] === player) count++;
                    else break;
                }
                
                if(count >= WIN_CONDITION) return true;
            }
            return false;
        }

        // проверка ничьи (все клетки заполнены, победителя нет)
        function isDraw() {
            for(let i=0; i<BOARD_SIZE; i++) {
                for(let j=0; j<BOARD_SIZE; j++) {
                    if(board[i][j] === null) return false;
                }
            }
            return true;
        }

        // завершение игры с победой или ничьей
        function endGame(winnerPlayer = null) {
            gameActive = false;
            if(winnerPlayer === 'X') {
                winner = 'X';
                scoreX++;
                updateScoreUI();
            } else if(winnerPlayer === 'O') {
                winner = 'O';
                scoreO++;
                updateScoreUI();
            } else {
                // ничья
                winner = null;
            }
            updateTurnUI();
            renderBoard(true); // true = окончание игры (добавим стиль победных клеток, если победитель есть)
        }

        // рендер доски с возможностью подсветки победных клеток
        function renderBoard(isGameEnd = false) {
            boardElement.innerHTML = '';
            let winningCells = [];

            // если игра окончена и есть победитель — найдём все клетки, составляющие линию победы (для анимации)
            if(isGameEnd && winner && gameActive === false) {
                winningCells = getWinningCombinationCells(winner);
            }

            for(let i=0; i<BOARD_SIZE; i++) {
                for(let j=0; j<BOARD_SIZE; j++) {
                    const value = board[i][j];
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    if(value === 'X') cell.classList.add('X');
                    if(value === 'O') cell.classList.add('O');
                    if(value !== null) cell.classList.add('disabled-cell');
                    
                    // подсветка победной ячейки
                    const isWinning = winningCells.some(cellPos => cellPos.row === i && cellPos.col === j);
                    if(isWinning && winner) {
                        cell.classList.add('win-highlight');
                    }
                    
                    cell.textContent = value || '';
                    if(gameActive && value === null) {
                        cell.style.cursor = 'pointer';
                        cell.addEventListener('click', (function(row, col) {
                            return function() { makeMove(row, col); };
                        })(i, j));
                    } else {
                        cell.style.cursor = 'default';
                    }
                    boardElement.appendChild(cell);
                }
            }
        }

        // Функция для поиска победной комбинации (первой найденной) — чисто для визуального эффекта
        function getWinningCombinationCells(player) {
            for(let i=0; i<BOARD_SIZE; i++) {
                for(let j=0; j<BOARD_SIZE; j++) {
                    if(board[i][j] !== player) continue;
                    
                    const dirs = [[1,0],[0,1],[1,1],[1,-1]];
                    for(let [dx, dy] of dirs) {
                        let cells = [{row: i, col: j}];
                        let count = 1;
                        // положительное направление
                        for(let step=1; step<=4; step++) {
                            const nr = i + dx*step, nc = j + dy*step;
                            if(nr<0 || nr>=BOARD_SIZE || nc<0 || nc>=BOARD_SIZE) break;
                            if(board[nr][nc] === player) {
                                cells.push({row: nr, col: nc});
                                count++;
                            } else break;
                        }
                        // отрицательное направление
                        for(let step=1; step<=4; step++) {
                            const nr = i - dx*step, nc = j - dy*step;
                            if(nr<0 || nr>=BOARD_SIZE || nc<0 || nc>=BOARD_SIZE) break;
                            if(board[nr][nc] === player) {
                                cells.push({row: nr, col: nc});
                                count++;
                            } else break;
                        }
                        if(count >= WIN_CONDITION) {
                            // возвращаем уникальные клетки (могут дублироваться, но set по строке)
                            const unique = [];
                            const keyMap = new Set();
                            for(let cell of cells) {
                                const key = `${cell.row},${cell.col}`;
                                if(!keyMap.has(key)) {
                                    keyMap.add(key);
                                    unique.push(cell);
                                }
                            }
                            return unique;
                        }
                    }
                }
            }
            return [];
        }

        // основной ход
        function makeMove(row, col) {
            if(!gameActive) return;
            if(board[row][col] !== null) return;
            
            // ставим текущего игрока
            board[row][col] = currentPlayer;
            
            // проверка победы
            const win = checkWin(row, col, currentPlayer);
            if(win) {
                endGame(currentPlayer);
                renderBoard(true);
                return;
            }
            
            // проверка ничьи
            if(isDraw()) {
                gameActive = false;
                winner = null;
                updateTurnUI();
                renderBoard(true);
                return;
            }
            
            // смена игрока
            currentPlayer = (currentPlayer === 'X') ? 'O' : 'X';
            updateTurnUI();
            renderBoard(false);
        }
        
        // полный сброс игры (без сброса счёта)
        function resetGame(resetScore = false) {
            // очищаем доску
            board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(null));
            currentPlayer = 'X';
            gameActive = true;
            winner = null;
            if(resetScore) {
                scoreX = 0;
                scoreO = 0;
                updateScoreUI();
            }
            updateTurnUI();
            renderBoard(false);
        }
        
        // сброс с обнулением счёта (кнопка дополнительная? добавим по двойному клику? но сделаем в resetBtn по умолчанию — новая игра без сброса счета? Лучше: 
        // по кнопке "Новая игра" сбрасываем только поле, счёт остаётся. Но добавим скрытый сброс счета? Сделаем контекстное меню? Нет, добавим вторую функцию через долгое нажатие? 
        // Пусть будет просто: кнопка сбрасывает только текущую партию. Для сброса счета сделаем двойной клик по кнопке (сообщим в подсказке) либо добавим кнопку очистить счёт.
        // Лучше добавить чистую кнопку внизу маленькую? Допишем span с функцией.
        
        // Добавим функционал сброса счёта двойным тапом / или маленькой ссылкой.
        function fullResetWithScore() {
            resetGame(true);
        }
        
        // Настраиваем кнопки
        resetBtn.addEventListener('click', () => {
            resetGame(false);
        });
        
        // Добавляем скрытый сброс счета при двойном клике на кнопку "Новая игра"
        resetBtn.addEventListener('dblclick', (e) => {
            e.stopPropagation();
            fullResetWithScore();
            // маленький фидбек
            const originalText = resetBtn.innerText;
            resetBtn.innerText = '✨ Счёт обнулён ✨';
            setTimeout(() => {
                resetBtn.innerText = originalText;
            }, 800);
        });
        
        // tooltip (подсказка)
        const footerHint = document.createElement('div');
        footerHint.style.fontSize = '0.7rem';
        footerHint.style.marginTop = '8px';
        footerHint.style.opacity = '0.7';
        footerHint.innerText = '💡 Двойной клик по кнопке "Новая игра" — сбросить счёт';
        document.querySelector('.status').after(footerHint);
        
        // Инициализация
        resetGame(false);
    })();
</script>
</body>
</html>
