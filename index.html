<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ормузский пролив - уклонение от ракет</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #0a2f3a 0%, #05202b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }
        .game-container {
            background: #021017;
            border-radius: 38px;
            padding: 12px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 0 0 3px #3a6e6f, 0 10px 25px rgba(0,0,0,0.3);
            cursor: none;
            background-color: #1a4d5e;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 16px;
            background: #03161ec9;
            backdrop-filter: blur(4px);
            padding: 8px 18px;
            border-radius: 60px;
            color: #c7f0f7;
            text-shadow: 0 2px 2px black;
            font-weight: bold;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .score-box, .hp-box, .tip {
            background: #00000066;
            padding: 6px 14px;
            border-radius: 32px;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        .hp-box span {
            color: #ffaa66;
            font-size: 1.4rem;
        }
        button {
            background: #d99e32;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
            padding: 5px 15px;
            border-radius: 60px;
            color: #1e2f2c;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #6b3c0c;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #6b3c0c;
        }
        .tip {
            font-size: 0.8rem;
            background: #11181ce6;
        }
        @media (max-width: 550px) {
            .info-panel { font-size: 0.8rem; gap: 8px; }
            .score-box, .hp-box, .tip { padding: 3px 10px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="1000" height="550"></canvas>
        <div class="info-panel">
            <div class="score-box">🚢 ПРОЙДЕНО: <span id="scoreValue">0</span></div>
            <div class="hp-box">🛡️ ЖИВУЧЕСТЬ: <span id="hpValue">3</span></div>
            <div class="tip">⬅️ ➡️  ⬆️ ⬇️  |  уклоняйся от 🚀</div>
            <button id="resetBtn">⚡ НОВОЕ ПЛАВАНИЕ</button>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- КОНФИГУРАЦИЯ - ОРМУЗСКИЙ ПРОЛИВ ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Размеры мира
        const W = 1000, H = 550;
        // Берег Ирана (ракетная сторона) - верхняя часть карты
        const IRAN_COAST_Y = 75;      // линия побережья, ракеты летят сверху вниз
        // Противоположный берег (Оман / ОАЭ) - чисто визуально низ
        const OMAN_COAST_Y = H - 65;
        
        // Параметры корабля
        const SHIP_WIDTH = 38;
        const SHIP_HEIGHT = 28;
        let ship = {
            x: W/2 - 15,
            y: H/2 + 20,
            hp: 3,
            invincibleTimer: 0   // фреймы неуязвимости после попадания
        };
        
        let score = 0;            // сколько ракет удалось избежать (прогресс)
        let gameOver = false;
        
        // Массив ракет (летят из Ирана в сторону корабля)
        let missiles = [];
        
        // Параметры генерации ракет
        let missileSpawnCounter = 0;
        const MISSILE_SPAWN_DELAY_FRAMES = 40;   // стартовая частота ~0.66сек при 60fps
        let currentSpawnDelay = MISSILE_SPAWN_DELAY_FRAMES;
        
        // Класс ракеты
        class Missile {
            constructor(x, y, targetX, targetY) {
                this.x = x;               // стартовая позиция (верхняя часть, иранское побережье)
                this.y = y;
                this.targetX = targetX;
                this.targetY = targetY;
                // вычисляем направление к текущей позиции корабля (момент создания)
                const dx = targetX - x;
                const dy = targetY - y;
                const len = Math.hypot(dx, dy);
                if(len < 0.01) {
                    this.vx = 0;
                    this.vy = 4;
                } else {
                    const speed = 3.9;    // скорость ракеты
                    this.vx = (dx / len) * speed;
                    this.vy = (dy / len) * speed;
                }
                this.radius = 8;
                this.active = true;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                // уничтожение если вышла за границы (за пределы карты или далеко за корабль)
                if(this.x < -50 || this.x > W+50 || this.y < -50 || this.y > H+100) {
                    this.active = false;
                }
            }
            
            draw(ctx) {
                // Огненная ракета с хвостом
                ctx.save();
                ctx.shadowBlur = 0;
                ctx.beginPath();
                // корпус
                ctx.fillStyle = "#d64531";
                ctx.shadowColor = "orange";
                ctx.shadowBlur = 8;
                ctx.ellipse(this.x, this.y, 7, 4, Math.atan2(this.vy, this.vx), 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#ff8c42";
                ctx.beginPath();
                ctx.ellipse(this.x - this.vx*2, this.y - this.vy*2, 4, 3, Math.atan2(this.vy, this.vx), 0, Math.PI*2);
                ctx.fill();
                // пламя
                ctx.fillStyle = "#ff5500";
                ctx.beginPath();
                ctx.ellipse(this.x - this.vx*3.5, this.y - this.vy*3.2, 3, 2, Math.atan2(this.vy, this.vx), 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
                // дымок
                ctx.beginPath();
                ctx.fillStyle = "#aa8866aa";
                ctx.arc(this.x - this.vx*1.5, this.y - this.vy*1.8, 3, 0, Math.PI*2);
                ctx.fill();
            }
        }
        
        // Управление клавишами
        const keys = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
            w: false, s: false, a: false, d: false
        };
        
        let animationId = null;
        
        // Сброс игры
        function resetGame() {
            gameOver = false;
            ship.hp = 3;
            ship.invincibleTimer = 0;
            score = 0;
            updateUI();
            missiles = [];
            // начальная позиция корабля - безопасная зона пролива (центр, чуть ниже середины)
            ship.x = W/2 - SHIP_WIDTH/2;
            ship.y = H/2 + 25;
            // ограничиваем, чтобы не вылез за берега
            clampShipPosition();
            missileSpawnCounter = 5;  // быстрый старт
            currentSpawnDelay = MISSILE_SPAWN_DELAY_FRAMES;
        }
        
        function clampShipPosition() {
            // границы: не заезжать на иранский берег (верх) и на оманский берег (низ)
            const minX = 12;
            const maxX = W - SHIP_WIDTH - 12;
            const minY = IRAN_COAST_Y + 18;   // чуть ниже береговой линии Ирана + безопасность
            const maxY = OMAN_COAST_Y - SHIP_HEIGHT - 5;
            ship.x = Math.min(maxX, Math.max(minX, ship.x));
            ship.y = Math.min(maxY, Math.max(minY, ship.y));
        }
        
        function updateUI() {
            document.getElementById('scoreValue').innerText = score;
            document.getElementById('hpValue').innerText = ship.hp;
        }
        
        // Проверка столкновений корабля с ракетами
        function handleCollisions() {
            if (gameOver) return;
            for(let i=0; i<missiles.length; i++) {
                const m = missiles[i];
                if(!m.active) continue;
                // bounding box корабля
                const shipLeft = ship.x;
                const shipRight = ship.x + SHIP_WIDTH;
                const shipTop = ship.y;
                const shipBottom = ship.y + SHIP_HEIGHT;
                // проверка попадания (круг ракеты в прямоугольник)
                const closestX = Math.max(shipLeft, Math.min(m.x, shipRight));
                const closestY = Math.max(shipTop, Math.min(m.y, shipBottom));
                const dx = closestX - m.x;
                const dy = closestY - m.y;
                const dist = Math.hypot(dx, dy);
                if(dist < m.radius) {
                    // попадание!
                    if(ship.invincibleTimer <= 0 && !gameOver) {
                        ship.hp--;
                        updateUI();
                        if(ship.hp <= 0) {
                            gameOver = true;
                            ship.hp = 0;
                            updateUI();
                        } else {
                            ship.invincibleTimer = 45;  // ~0.75 секунд неуязвимости при 60fps
                        }
                    }
                    // независимо от неуязвимости ракету удаляем, чтобы не множило урон
                    m.active = false;
                }
            }
            // понижаем таймер неуязвимости
            if(ship.invincibleTimer > 0) ship.invincibleTimer--;
        }
        
        // Генерация ракет с иранского побережья
        function spawnMissileIfNeeded() {
            if(gameOver) return;
            if(missileSpawnCounter <= 0) {
                // случайная позиция по оси X на побережье Ирана
                const startX = 20 + Math.random() * (W - 40);
                const startY = IRAN_COAST_Y + 5 + Math.random() * 12;
                // цель - текущая позиция корабля (центр)
                const targetX = ship.x + SHIP_WIDTH/2;
                const targetY = ship.y + SHIP_HEIGHT/2;
                missiles.push(new Missile(startX, startY, targetX, targetY));
                // динамическая сложность: чем больше очков, тем чаще ракеты
                let newDelay = Math.max(22, MISSILE_SPAWN_DELAY_FRAMES - Math.floor(score / 30));
                currentSpawnDelay = newDelay;
                missileSpawnCounter = currentSpawnDelay;
            } else {
                missileSpawnCounter--;
            }
        }
        
        // Обновление движения корабля по нажатым клавишам
        function updateShipMovement() {
            if(gameOver) return;
            let moveX = 0, moveY = 0;
            if(keys.ArrowLeft || keys.a) moveX = -1;
            if(keys.ArrowRight || keys.d) moveX = 1;
            if(keys.ArrowUp || keys.w) moveY = -1;
            if(keys.ArrowDown || keys.s) moveY = 1;
            
            if(moveX !== 0 || moveY !== 0) {
                const len = Math.hypot(moveX, moveY);
                moveX /= len;
                moveY /= len;
            }
            const SPEED = 4.8;
            ship.x += moveX * SPEED;
            ship.y += moveY * SPEED;
            clampShipPosition();
        }
        
        // Обновление ракет + удаление неактивных
        function updateMissiles() {
            for(let i=0; i<missiles.length; i++) {
                missiles[i].update();
                if(!missiles[i].active) {
                    missiles.splice(i,1);
                    i--;
                }
            }
        }
        
        // Начисление очков: просто за выживание (каждый кадр? нет, логичнее по времени)
        // Но добавим счетчик: каждые 40 кадров +1 (примерно0.7сек), также при успешном уклонении от ракет
        let scoreTimer = 0;
        function updateScoreProgression() {
            if(gameOver) return;
            scoreTimer++;
            if(scoreTimer >= 38) {
                scoreTimer = 0;
                score++;
                updateUI();
            }
        }
        
        // ---- ОТРИСОВКА ВСЕЙ КАРТЫ + ИНТЕРФЕЙСА С ПОДСКАЗКОЙ ПО УПРАВЛЕНИЮ ----
        function drawGame() {
            ctx.clearRect(0, 0, W, H);
            
            // 1. Вода с градиентом (глубины пролива)
            const waterGrd = ctx.createLinearGradient(0, 0, 0, H);
            waterGrd.addColorStop(0, "#2c6e7e");
            waterGrd.addColorStop(1, "#154e5c");
            ctx.fillStyle = waterGrd;
            ctx.fillRect(0, 0, W, H);
            
            // 2. Полосатые волны
            ctx.globalAlpha = 0.35;
            for(let i=0;i<60;i++) {
                ctx.beginPath();
                ctx.moveTo(0, i*19 + (Date.now()*0.002)%19);
                ctx.lineTo(W, i*19 + (Date.now()*0.003)%22);
                ctx.strokeStyle = "#b3e4f0";
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
            ctx.globalAlpha = 1;
            
            // 3. Берег Ирана (пустынный, с ракетными установками)
            ctx.fillStyle = "#b97f48";
            ctx.shadowBlur = 0;
            ctx.fillRect(0, 0, W, IRAN_COAST_Y+12);
            ctx.fillStyle = "#966e40";
            for(let i=0;i<12;i++) {
                ctx.fillRect(i*90, IRAN_COAST_Y-12, 45, 18);
            }
            ctx.fillStyle = "#5e3a1f";
            ctx.font = "bold 18 monospace";
            ctx.shadowColor = "black";
            ctx.fillText("🇮🇷 ИРАН | РАКЕТНЫЕ УСТАНОВКИ", 28, IRAN_COAST_Y-18);
            // Рисуем ракетные шахты
            for(let i=0;i<9;i++) {
                ctx.fillStyle = "#4a3a28";
                ctx.fillRect(70 + i*105, IRAN_COAST_Y-5, 12, 20);
                ctx.fillStyle = "#d63e2e";
                ctx.beginPath();
                ctx.rect(72 + i*105, IRAN_COAST_Y-12, 8, 12);
                ctx.fill();
            }
            
            // 4. Южный берег (Оман / ОАЭ)
            ctx.fillStyle = "#bc9a6c";
            ctx.fillRect(0, OMAN_COAST_Y, W, H-OMAN_COAST_Y+5);
            ctx.fillStyle = "#e7cfa1";
            ctx.font = "italic 16 monospace";
            ctx.fillText("🌊 Оманский залив | Безопасные воды", W-210, OMAN_COAST_Y+28);
            ctx.fillStyle = "#7a5a3a";
            for(let i=0;i<8;i++) ctx.fillRect(i*130, OMAN_COAST_Y-9, 55, 12);
            
            // 5. Фарватер пролива - пунктирная линия
            ctx.beginPath();
            ctx.setLineDash([18, 25]);
            ctx.strokeStyle = "#ffd966";
            ctx.lineWidth = 2.5;
            for(let y = IRAN_COAST_Y+30; y<OMAN_COAST_Y-20; y+=35) {
                ctx.beginPath();
                ctx.moveTo(40, y);
                ctx.lineTo(W-40, y);
                ctx.stroke();
            }
            ctx.setLineDash([]);
            
            // 6. КОРАБЛЬ (с анимацией дыма и неуязвимости)
            if(ship.invincibleTimer > 0 && (Math.floor(Date.now()/50) % 3 < 1)) {
                ctx.fillStyle = "#ddffddcc";
                ctx.shadowBlur = 12;
            } else {
                ctx.fillStyle = "#4f7c6b";
                ctx.shadowBlur = 4;
            }
            ctx.shadowColor = "#003333";
            ctx.fillRect(ship.x, ship.y, SHIP_WIDTH, SHIP_HEIGHT);
            ctx.fillStyle = "#c9a56b";
            ctx.fillRect(ship.x+5, ship.y-7, 28, 10);
            ctx.fillStyle = "#f4d58c";
            ctx.beginPath();
            ctx.moveTo(ship.x+SHIP_WIDTH-8, ship.y-3);
            ctx.lineTo(ship.x+SHIP_WIDTH+5, ship.y+5);
            ctx.lineTo(ship.x+SHIP_WIDTH-8, ship.y+13);
            ctx.fill();
            // труба и дым
            ctx.fillStyle = "#7a5436";
            ctx.fillRect(ship.x+28, ship.y-4, 6, 10);
            ctx.fillStyle = "#aaaaaa88";
            ctx.beginPath();
            ctx.arc(ship.x+31, ship.y-9, 5, 0, Math.PI*2);
            ctx.fill();
            
            // палуба - звезда
            ctx.fillStyle = "#f2c94c";
            ctx.font = "18px monospace";
            ctx.fillText("⚓", ship.x+14, ship.y+20);
            
            // 7. Ракеты
            for(let m of missiles) m.draw(ctx);
            
            // 8. Надписи правил и управления прямо на Canvas (КРАТКОЕ ПОЯСНЕНИЕ)
            ctx.font = "bold 14px 'Segoe UI', 'Courier New'";
            ctx.fillStyle = "#ffffd0";
            ctx.shadowBlur = 3;
            ctx.shadowColor = "#021a1a";
            ctx.fillText("◀ ▶ ▲ ▼  или  WASD  —  ПЕРЕМЕЩЕНИЕ КОРАБЛЯ", W-310, 32);
            ctx.font = "bold 12px monospace";
            ctx.fillStyle = "#ffeeaa";
            ctx.fillText("💥 УКЛОНЯЙСЯ ОТ РАКЕТ С ВЕРХНЕГО БЕРЕГА (ИРАН)", W-315, 57);
            ctx.fillStyle = "#d6ffb0";
            ctx.fillText("✅ ПРОЙДИТЕ ПРОЛИВ — ЧЕМ ДОЛЬШЕ, ТЕМ ВЫШЕ СЧЁТ", W-305, 80);
            
            // подсказка про живучесть
            ctx.font = "bold 14px monospace";
            ctx.fillStyle = "#ffbb88";
            ctx.fillText("❤️ ПОСЛЕ ПОПАДАНИЯ — КОРОТКАЯ НЕУЯЗВИМОСТЬ", 18, H-22);
            
            // если игра окончена
            if(gameOver) {
                ctx.font = "800 44 monospace";
                ctx.fillStyle = "#ed7a3c";
                ctx.shadowBlur = 8;
                ctx.fillText("⚡ КОРАБЛЬ ПОТОПЛЕН ⚡", W/2-210, H/2-50);
                ctx.font = "26px monospace";
                ctx.fillStyle = "#ffcd94";
                ctx.fillText("Нажми [НОВОЕ ПЛАВАНИЕ]", W/2-140, H/2+35);
                ctx.fillStyle = "white";
                ctx.font = "bold 20px monospace";
                ctx.fillText("ПРОЙДЕНО ОЧКОВ: "+score, W/2-120, H/2+90);
            }
            
            // маленький индикатор неуязвимости
            if(ship.invincibleTimer > 0 && !gameOver) {
                ctx.font = "bold 12px monospace";
                ctx.fillStyle = "#adff9e";
                ctx.fillText("✨ НЕУЯЗВИМ ✨", ship.x-8, ship.y-12);
            }
        }
        
        // ---- ОСНОВНОЙ ИГРОВОЙ ЦИКЛ ----
        function gameLoop() {
            if(!gameOver) {
                updateShipMovement();
                updateMissiles();
                spawnMissileIfNeeded();
                handleCollisions();
                updateScoreProgression();
                // увеличение сложности: каждые 30 очков ракеты чуть быстрее (дополнительно)
                if(missiles.length > 0 && score>30) {
                    // небольшая модификация скорости уже существующих ракет? не трогаем, честно
                }
            }
            drawGame();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // ---- НАСТРОЙКА ОБРАБОТЧИКОВ КЛАВИАТУРЫ ----
        function handleKeyDown(e) {
            const key = e.key;
            if(keys.hasOwnProperty(key)) {
                keys[key] = true;
                e.preventDefault();
            }
            // дополнительная блокировка стрелок от скролла
            if (key === "ArrowUp" || key === "ArrowDown" || key === "ArrowLeft" || key === "ArrowRight") {
                e.preventDefault();
            }
        }
        
        function handleKeyUp(e) {
            const key = e.key;
            if(keys.hasOwnProperty(key)) {
                keys[key] = false;
                e.preventDefault();
            }
        }
        
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        document.getElementById('resetBtn').addEventListener('click', () => {
            resetGame();
        });
        
        // Запуск игры
        resetGame();
        animationId = requestAnimationFrame(gameLoop);
        
        // корректная остановка при выгрузке (необяз)
        window.addEventListener('beforeunload', ()=>{
            if(animationId) cancelAnimationFrame(animationId);
        });
    })();
</script>
</body>
</html>
